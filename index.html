<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - South Africa</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="weather-app">
            <h1><i class="fas fa-cloud-sun"></i> Weather App</h1>
            <p class="subtitle">South Africa & Worldwide</p>
            
            <div class="search-section">
                <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
                <button id="search-btn"><i class="fas fa-search"></i></button>
                <button id="location-btn" title="Use my location"><i class="fas fa-location-arrow"></i></button>
            </div>

            <!-- Quick SA Cities -->
            <div class="quick-cities">
                <span class="quick-label">SA Cities:</span>
                <button class="quick-btn" data-city="Johannesburg">Johannesburg</button>
                <button class="quick-btn" data-city="Cape Town">Cape Town</button>
                <button class="quick-btn" data-city="Durban">Durban</button>
                <button class="quick-btn" data-city="Pretoria">Pretoria</button>
                <button class="quick-btn" data-city="Port Elizabeth">Port Elizabeth</button>
            </div>

            <div id="loading" class="loading hidden">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading weather data...</p>
            </div>

            <div id="error" class="error hidden">
                <i class="fas fa-exclamation-circle"></i>
                <p id="error-message">Something went wrong</p>
            </div>

            <div id="weather-result" class="weather-result hidden">
                <div class="current-weather">
                    <h2 id="city-name">Johannesburg</h2>
                    <p id="current-date">Monday, June 15</p>
                    
                    <div class="weather-main">
                        <img id="weather-icon" src="" alt="Weather icon">
                        <div class="temp-section">
                            <span id="temperature">--</span>
                            <span class="unit">°F</span>
                        </div>
                    </div>
                    
                    <p id="weather-description">Loading...</p>
                    
                    <div class="weather-details">
                        <div class="detail">
                            <i class="fas fa-temperature-high"></i>
                            <span class="detail-label">Feels Like</span>
                            <span id="feels-like" class="detail-value">--°</span>
                        </div>
                        <div class="detail">
                            <i class="fas fa-tint"></i>
                            <span class="detail-label">Humidity</span>
                            <span id="humidity" class="detail-value">--%</span>
                        </div>
                        <div class="detail">
                            <i class="fas fa-wind"></i>
                            <span class="detail-label">Wind Speed</span>
                            <span id="wind-speed" class="detail-value">-- mph</span>
                        </div>
                        <div class="detail">
                            <i class="fas fa-eye"></i>
                            <span class="detail-label">Visibility</span>
                            <span id="visibility" class="detail-value">-- mi</span>
                        </div>
                    </div>
                </div>

                <div class="forecast-section">
                    <h3><i class="fas fa-calendar-alt"></i> 7-Day Forecast</h3>
                    <div id="forecast-list" class="forecast-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
